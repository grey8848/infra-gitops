services:
  nacos:
    image: docker.io/nacos/nacos-server:latest
    container_name: nacos-standalone-derby
    restart: unless-stopped
    env_file:
      - .env.nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      JAVA_TOOL_OPTIONS: "--add-opens=java.base/java.util=ALL-UNNAMED"
    ports:
      - "8080:8080"
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./data:/home/nacos/data:Z
      - ./logs:/home/nacos/logs:Z
